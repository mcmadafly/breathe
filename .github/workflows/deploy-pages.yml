# Deploys the Astro Cloudflare Pages bundle (`dist/cf-pages`) on every push to `main`.
# Production DB, Clerk, Stripe, etc. should be set on the Cloudflare Pages project for runtime;
# this workflow only needs enough env for `astro build` to bundle (Turso defaults to `:memory:` in CI when the secret is unset).
#
# Required repo secrets for deploy:
#   · CLOUDFLARE_API_TOKEN — Custom token (My Profile → API Tokens):
#       Permissions → Account → Cloudflare Pages → Edit (not “Read”; deploy needs write).
#       Account resources → this account, or All accounts.
#       If deploy still 403s, add Account → Workers Scripts → Edit (SSR / Pages Functions).
#   · CLOUDFLARE_ACCOUNT_ID — Must match the **same** Cloudflare account where the Pages project lives
#     (Workers & Pages → right sidebar “Account ID”). If CI reports 8000007 “project not found” but locally
#     `wrangler pages project create breathe` says 8000002 “already exists”, your GitHub CLOUDFLARE_ACCOUNT_ID
#     (or token account scope) points at a **different** account than your local Wrangler session — fix the secret.
#
# Optional:
#   · Repository variable CLOUDFLARE_PAGES_PROJECT — Pages **project name** in the dashboard (not the same as
#     a Worker script name). Defaults to **breathe** when unset (production site: spirare.io).
#     The workflow runs `wrangler pages project create` first so the first deploy can succeed even when
#     the project did not exist yet.
#
# Troubleshooting 403 / Authentication error [code: 10000]:
#   · Token missing Cloudflare Pages → Edit, or scoped to the wrong account.
#   · Ignore trailing /memberships 400 in Wrangler logs — common after a failed call with some tokens.
#
# References:
#   · https://developers.cloudflare.com/fundamentals/api/get-started/create-token/
#   · https://developers.cloudflare.com/pages/how-to/use-direct-upload-with-continuous-integration/

name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Used by `astro build` / bundle only; wrangler-action sets auth for deploy separately.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Repo “Variables” → CLOUDFLARE_PAGES_PROJECT, or default breathe (must exist in dashboard).
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT != '' && vars.CLOUDFLARE_PAGES_PROJECT || 'breathe' }}
      # Empty / missing secret → in-memory DB so `npm run build:pages` can bundle without a live Turso URL.
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL != '' && secrets.TURSO_DATABASE_URL || ':memory:' }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build:pages

      - name: Require Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Set the CLOUDFLARE_API_TOKEN repository secret (Pages/Workers deploy). See workflow header comment."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Set the CLOUDFLARE_ACCOUNT_ID repository secret."
            exit 1
          fi

      - name: Clear local Wrangler state
        run: rm -rf .wrangler dist/cf-pages/.wrangler

      - name: Cloudflare Pages project name
        run: echo "Deploying to Pages project — $CLOUDFLARE_PAGES_PROJECT"

      - name: Create Cloudflare Pages project if missing
        run: |
          npx wrangler pages project create "$CLOUDFLARE_PAGES_PROJECT" --production-branch main || \
            echo "::notice::pages project create non-zero exit (project often already exists); continuing."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          WRANGLER_LOG: debug
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          workingDirectory: dist/cf-pages
          command: pages deploy . --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT != '' && vars.CLOUDFLARE_PAGES_PROJECT || 'breathe' }}
